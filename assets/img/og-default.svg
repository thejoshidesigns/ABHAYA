<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Abhaya Behavioral Health — Mental wellness, with you at the center">
  <title>Abhaya Behavioral Health</title>
  <desc>Open Graph share card. Warm cream background with the Abhaya logo, practice name, tagline, and locations.</desc>

  <defs>
    <style>
      .bg        { fill: #F4F9FB; }
      .bg-accent { fill: #ECE3D2; }
      .ink       { fill: #2B2520; }
      .ink-soft  { fill: #5C544B; }
      .sage      { fill: #4F5F49; }
      .sage-2    { fill: #6E8265; }
      .terra     { fill: #07abce; }
      .terra-d   { fill: #8E3F2C; }
      .terra-s   { fill: #E5C9BD; }
      .leaf      { fill: #6E8265; }
      .leaf-d    { fill: #4F5F49; }
      .sun       { fill: #07abce; }
      .hand      { fill: #C9A24E; }
      .hand-stk  { stroke: #8E3F2C; stroke-width: 3; stroke-linejoin: round; fill: #C9A24E; }
      .chakra    { fill: #07abce; }
      .star      { fill: #F4F9FB; }
      .ring      { fill: none; stroke: #4F5F49; stroke-width: 4; stroke-dasharray: 3 11; }
      .h1        { font-family: 'Fraunces', Georgia, serif; font-weight: 500; font-style: italic; fill: #2B2520; }
      .tag       { font-family: 'Inter', sans-serif; font-weight: 400; fill: #5C544B; }
      .name      { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0.04em; fill: #4F5F49; }
      .loc       { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.18em; fill: #8E3F2C; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="630"/>

  <!-- Right-side warm radial accent -->
  <ellipse cx="980" cy="200" rx="380" ry="320" fill="#E5C9BD" opacity="0.45"/>
  <ellipse cx="1050" cy="500" rx="260" ry="220" fill="#07abce" opacity="0.06"/>

  <!-- Subtle horizon line -->
  <line x1="0" y1="540" x2="1200" y2="540" stroke="#D9CFBF" stroke-width="1"/>

  <!-- ===== LOGO (scaled up version of the real logo.svg) ===== -->
  <g transform="translate(80, 95) scale(3.6)">
    <!-- Outer dotted ring -->
    <circle cx="50" cy="50" r="46" class="ring"/>
    <!-- Sky half -->
    <path d="M50 18 A32 32 0 0 1 50 82 L50 18 Z" fill="#E5C9BD" opacity="0.45"/>
    <!-- Ground half -->
    <path d="M50 18 A32 32 0 0 0 50 82 L50 18 Z" class="leaf" opacity="0.45"/>
    <!-- Laurel leaves: left -->
    <ellipse class="leaf"   cx="18" cy="40" rx="6" ry="2.4" transform="rotate(-30 18 40)"/>
    <ellipse class="leaf-d" cx="18" cy="50" rx="6" ry="2.4" transform="rotate(-10 18 50)"/>
    <ellipse class="leaf"   cx="18" cy="60" rx="6" ry="2.4" transform="rotate(10 18 60)"/>
    <ellipse class="leaf-d" cx="22" cy="32" rx="5.5" ry="2.2" transform="rotate(-50 22 32)"/>
    <ellipse class="leaf"   cx="22" cy="68" rx="5.5" ry="2.2" transform="rotate(50 22 68)"/>
    <ellipse class="leaf-d" cx="28" cy="26" rx="5" ry="2" transform="rotate(-65 28 26)"/>
    <ellipse class="leaf"   cx="28" cy="74" rx="5" ry="2" transform="rotate(65 28 74)"/>
    <!-- Laurel leaves: right -->
    <ellipse class="leaf"   cx="82" cy="40" rx="6" ry="2.4" transform="rotate(30 82 40)"/>
    <ellipse class="leaf-d" cx="82" cy="50" rx="6" ry="2.4" transform="rotate(10 82 50)"/>
    <ellipse class="leaf"   cx="82" cy="60" rx="6" ry="2.4" transform="rotate(-10 82 60)"/>
    <ellipse class="leaf-d" cx="78" cy="32" rx="5.5" ry="2.2" transform="rotate(50 78 32)"/>
    <ellipse class="leaf"   cx="78" cy="68" rx="5.5" ry="2.2" transform="rotate(-50 78 68)"/>
    <ellipse class="leaf-d" cx="72" cy="26" rx="5" ry="2" transform="rotate(65 72 26)"/>
    <ellipse class="leaf"   cx="72" cy="74" rx="5" ry="2" transform="rotate(-65 72 74)"/>
    <!-- Sun rays -->
    <g class="sun" opacity="0.85">
      <rect x="49.2" y="20" width="1.6" height="14" rx="0.8"/>
      <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(15 50 50)"/>
      <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(-15 50 50)"/>
      <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(30 50 50)"/>
      <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(-30 50 50)"/>
    </g>
    <!-- Sun arc on horizon -->
    <path d="M30 50 A20 20 0 0 1 70 50" fill="none" stroke="#07abce" stroke-width="1.2"/>
    <!-- Hand -->
    <g>
      <path d="M40 60 Q40 46 50 46 Q60 46 60 60 L60 76 Q60 80 56 80 L44 80 Q40 80 40 76 Z" fill="#C9A24E" stroke="#8E3F2C" stroke-width="0.6" stroke-linejoin="round"/>
      <path d="M40 58 Q34 58 34 64 Q34 68 38 68 L40 68 Z" fill="#C9A24E" stroke="#8E3F2C" stroke-width="0.6" stroke-linejoin="round"/>
      <rect x="42" y="32" width="5" height="20" rx="2.5" fill="#C9A24E" stroke="#8E3F2C" stroke-width="0.6"/>
      <rect x="47.5" y="28" width="5" height="24" rx="2.5" fill="#C9A24E" stroke="#8E3F2C" stroke-width="0.6"/>
      <rect x="53" y="32" width="5" height="20" rx="2.5" fill="#C9A24E" stroke="#8E3F2C" stroke-width="0.6"/>
      <rect x="58.5" y="38" width="4.5" height="14" rx="2.25" fill="#C9A24E" stroke="#8E3F2C" stroke-width="0.6"/>
    </g>
    <!-- Chakra -->
    <circle cx="50" cy="60" r="4.5" fill="#07abce"/>
    <circle cx="50" cy="60" r="1.4" fill="#F4F9FB"/>
    <!-- Cardinal dots -->
    <circle cx="50" cy="3.5" r="1.4" fill="#4F5F49"/>
    <circle cx="96.5" cy="50" r="1.4" fill="#4F5F49"/>
    <circle cx="50" cy="96.5" r="1.4" fill="#4F5F49"/>
    <circle cx="3.5" cy="50" r="1.4" fill="#4F5F49"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(440, 180)">
    <text class="loc" x="0" y="0" font-size="18">ABHAYA BEHAVIORAL HEALTH</text>
    <text class="h1" x="0" y="80" font-size="78">Mental wellness,</text>
    <text class="h1" x="0" y="170" font-size="78">with <tspan fill="#07abce">you</tspan> at the center.</text>
  </g>

  <!-- ===== TAGLINE / META ===== -->
  <g transform="translate(440, 470)">
    <text class="tag" x="0" y="0" font-size="22">Supportive psychotherapy · medication management · telepsychiatry</text>
    <text class="tag" x="0" y="36" font-size="20" fill="#8E3F2C" font-weight="500">Columbia, Missouri · (573) 303-3544</text>
  </g>

  <!-- Bottom-right URL -->
  <text class="name" x="1140" y="600" font-size="16" text-anchor="end" fill="#6E8265">abhayabh.com</text>
</svg>