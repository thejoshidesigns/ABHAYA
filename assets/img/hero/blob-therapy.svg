<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Abstract illustration representing supportive psychotherapy">
  <defs>
    <linearGradient id="bg-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#ECE3D2"/>
    </linearGradient>
    <radialGradient id="glow-t" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A24E" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#C9A24E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bg-t)" rx="20"/>

  <!-- Soft sun glow -->
  <circle cx="200" cy="180" r="180" fill="url(#glow-t)"/>

  <!-- Two overlapping speech bubbles, abstract -->
  <g transform="translate(200 200)">
    <!-- Bubble 1 (terracotta) -->
    <ellipse cx="-30" cy="-20" rx="78" ry="58" fill="#07abce"/>
    <path d="M-60 30 L-78 56 L-46 30 Z" fill="#07abce"/>
    <circle cx="-50" cy="-25" r="5" fill="#F4F9FB"/>
    <circle cx="-30" cy="-25" r="5" fill="#F4F9FB"/>
    <circle cx="-10" cy="-25" r="5" fill="#F4F9FB"/>

    <!-- Bubble 2 (sage) -->
    <ellipse cx="36" cy="14" rx="64" ry="48" fill="#6E8265"/>
    <path d="M62 56 L78 78 L48 56 Z" fill="#6E8265"/>
    <circle cx="20" cy="10" r="4" fill="#F4F9FB"/>
    <circle cx="38" cy="10" r="4" fill="#F4F9FB"/>
    <circle cx="56" cy="10" r="4" fill="#F4F9FB"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="6" fill="#C9A24E" opacity="0.7"/>
  <circle cx="340" cy="100" r="4" fill="#6E8265" opacity="0.7"/>
  <circle cx="60" cy="340" r="5" fill="#07abce" opacity="0.6"/>
  <circle cx="350" cy="320" r="3" fill="#C9A24E" opacity="0.6"/>
</svg>