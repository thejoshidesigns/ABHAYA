<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Abhaya Behavioral Health logo">
  <title>Abhaya — A hand within a laurel wreath, the Sanskrit symbol of fearlessness</title>
  <defs>
    <style>
      .ring { fill: none; stroke: #4F5F49; stroke-width: 0.8; }
      .dot  { fill: #4F5F49; }
      .leaf { fill: #6E8265; }
      .leaf-d { fill: #4F5F49; }
      .sun  { fill: #07abce; }
      .sky  { fill: #E5C9BD; }
      .ground { fill: #6E8265; }
      .hand { fill: #C9A24E; stroke: #8E3F2C; stroke-width: 0.6; stroke-linejoin: round; }
      .chakra { fill: #07abce; }
      .star { fill: #F4F9FB; }
    </style>
  </defs>

  <!-- Outer dotted ring -->
  <circle cx="50" cy="50" r="46" class="ring" stroke-dasharray="0.6 2.2"/>

  <!-- Sky half (sunset) -->
  <path d="M50 18 A32 32 0 0 1 50 82 L50 18 Z" class="sky" opacity="0.45"/>
  <!-- Ground half -->
  <path d="M50 18 A32 32 0 0 0 50 82 L50 18 Z" class="ground" opacity="0.45"/>

  <!-- Laurel leaves: left side -->
  <g>
    <ellipse class="leaf" cx="18" cy="40" rx="6" ry="2.4" transform="rotate(-30 18 40)"/>
    <ellipse class="leaf-d" cx="18" cy="50" rx="6" ry="2.4" transform="rotate(-10 18 50)"/>
    <ellipse class="leaf" cx="18" cy="60" rx="6" ry="2.4" transform="rotate(10 18 60)"/>
    <ellipse class="leaf-d" cx="22" cy="32" rx="5.5" ry="2.2" transform="rotate(-50 22 32)"/>
    <ellipse class="leaf" cx="22" cy="68" rx="5.5" ry="2.2" transform="rotate(50 22 68)"/>
    <ellipse class="leaf" cx="28" cy="26" rx="5" ry="2" transform="rotate(-65 28 26)"/>
    <ellipse class="leaf-d" cx="28" cy="74" rx="5" ry="2" transform="rotate(65 28 74)"/>
  </g>
  <!-- Laurel leaves: right side -->
  <g>
    <ellipse class="leaf" cx="82" cy="40" rx="6" ry="2.4" transform="rotate(30 82 40)"/>
    <ellipse class="leaf-d" cx="82" cy="50" rx="6" ry="2.4" transform="rotate(10 82 50)"/>
    <ellipse class="leaf" cx="82" cy="60" rx="6" ry="2.4" transform="rotate(-10 82 60)"/>
    <ellipse class="leaf-d" cx="78" cy="32" rx="5.5" ry="2.2" transform="rotate(50 78 32)"/>
    <ellipse class="leaf" cx="78" cy="68" rx="5.5" ry="2.2" transform="rotate(-50 78 68)"/>
    <ellipse class="leaf" cx="72" cy="26" rx="5" ry="2" transform="rotate(65 72 26)"/>
    <ellipse class="leaf-d" cx="72" cy="74" rx="5" ry="2" transform="rotate(-65 72 74)"/>
  </g>

  <!-- Sun rays behind hand -->
  <g class="sun" opacity="0.85">
    <rect x="49.2" y="20" width="1.6" height="14" rx="0.8"/>
    <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(15 50 50)"/>
    <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(-15 50 50)"/>
    <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(30 50 50)"/>
    <rect x="49.2" y="20" width="1.6" height="14" rx="0.8" transform="rotate(-30 50 50)"/>
  </g>

  <!-- Sun arc on horizon -->
  <path d="M30 50 A20 20 0 0 1 70 50" class="ring" stroke="#07abce" stroke-width="1.2"/>

  <!-- Hand -->
  <g class="hand">
    <!-- Palm -->
    <path d="M40 60 Q40 46 50 46 Q60 46 60 60 L60 76 Q60 80 56 80 L44 80 Q40 80 40 76 Z"/>
    <!-- Thumb -->
    <path d="M40 58 Q34 58 34 64 Q34 68 38 68 L40 68 Z"/>
    <!-- Index finger -->
    <rect x="42" y="32" width="5" height="20" rx="2.5"/>
    <!-- Middle finger -->
    <rect x="47.5" y="28" width="5" height="24" rx="2.5"/>
    <!-- Ring finger -->
    <rect x="53" y="32" width="5" height="20" rx="2.5"/>
    <!-- Pinky -->
    <rect x="58.5" y="38" width="4.5" height="14" rx="2.25"/>
  </g>

  <!-- Chakra / bindu in palm -->
  <circle cx="50" cy="60" r="4.5" class="chakra"/>
  <circle cx="50" cy="60" r="1.4" class="star"/>

  <!-- Decorative dots around outer ring -->
  <circle cx="50" cy="3.5" r="1.4" class="dot"/>
  <circle cx="96.5" cy="50" r="1.4" class="dot"/>
  <circle cx="50" cy="96.5" r="1.4" class="dot"/>
  <circle cx="3.5" cy="50" r="1.4" class="dot"/>
</svg>